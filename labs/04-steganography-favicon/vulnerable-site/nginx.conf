server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Disable caching for lab purposes
    add_header Cache-Control "no-store, no-cache, must-revalidate";

    # CORS headers
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type";

    location / {
        try_files $uri $uri/ =404;
    }

    # Health check - served directly by nginx
    location = /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Proxy C2 server requests
    # /c2 is used when accessed via Traefik (Traefik strips /lab4 prefix)
    # Matches /c2, /c2/, /c2/collect, /c2/stolen, /collect, /api, /stats, /dashboard
    location ~ ^/(c2|collect|api|stats|stolen|dashboard)(/|$) {
        proxy_pass http://lab4-c2-server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Rewrite /c2 to / for C2 server (it expects root path)
        rewrite ^/c2(/.*)?$ /$1 break;
    }

    # Serve static assets with no caching (lab needs fresh files)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}